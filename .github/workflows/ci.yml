name: ci

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: dotnet restore OpenPortalKit.sln
      - shell: pwsh
        run: ./tools/check-vulnerable-packages.ps1
      - run: dotnet build OpenPortalKit.sln --no-restore -m:1
      - shell: pwsh
        run: ./tools/run-tests.ps1
      - run: npm ci
        working-directory: apps/web
      - run: npm audit --audit-level=moderate
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - shell: pwsh
        run: ./tools/check-boundaries.ps1
