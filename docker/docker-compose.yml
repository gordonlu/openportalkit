services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: openportalkit
      POSTGRES_USER: openportalkit
      POSTGRES_PASSWORD: openportalkit_dev
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"
